name: Recruitment AI - Make Screening Call

on:
  workflow_dispatch:
    inputs:
      candidate_name:
        description: 'Candidate Full Name'
        required: true
        default: 'Sai Deva Puttur'
      candidate_phone:
        description: 'Candidate Phone (E.164 format)'
        required: true
        default: '+17327225000'

jobs:
  make-call:
    name: Place Twilio Screening Call
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Twilio SDK
        run: pip install twilio

      - name: Place Screening Call to Candidate
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ github.event.inputs.candidate_phone }}
        run: |
          echo "Placing call to: ${{ github.event.inputs.candidate_name }}"
          echo "Phone: ${{ github.event.inputs.candidate_phone }}"
          python agents/make_call.py

      - name: Call Complete
        run: |
          echo "Screening call initiated for ${{ github.event.inputs.candidate_name }}"
          echo "Check Twilio console for call status and recording."
